<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>DeepChat · Лента + Чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== ШАПКА ===== */
        .site-header {
            background: linear-gradient(135deg, #0f0f18, #0a0a0a);
            border-bottom: 1px solid #1a1a1a;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .site-header .logo {
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .site-header .logo span { color: #1877f2; }
        .site-header .logo .badge {
            font-size: 0.5rem;
            background: #1877f2;
            color: #fff;
            padding: 2px 10px;
            border-radius: 40px;
            font-weight: 600;
        }
        .site-header .site-nav {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .site-header .site-nav a {
            color: #888;
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }
        .site-header .site-nav a:hover { color: #fff; }
        .site-header .site-nav .btn {
            background: #1877f2;
            color: #fff;
            padding: 4px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .site-header .site-nav .btn:hover { background: #4a9eff; }

        /* ===== ГЕРОЙ ===== */
        .hero {
            text-align: center;
            padding: 20px 16px 12px;
            max-width: 800px;
            margin: 0 auto;
        }
        .hero h1 {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
        }
        .hero h1 span { color: #1877f2; }
        .hero p {
            color: #888;
            font-size: 0.9rem;
            margin-top: 4px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .hero .hero-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .hero .hero-stats .stat {
            text-align: center;
        }
        .hero .hero-stats .stat .num {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
        }
        .hero .hero-stats .stat .label {
            font-size: 0.6rem;
            color: #666;
        }

        /* ===== ВИДЖЕТЫ ===== */
        .widget-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 12px 30px;
        }
        .widget-wrapper .widget-card {
            background: #0f0f18;
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            margin-bottom: 16px;
        }
        .widget-wrapper .widget-card .widget-header {
            padding: 8px 14px;
            background: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .widget-wrapper .widget-card .widget-header .w-title {
            font-weight: 700;
            font-size: 0.85rem;
            color: #fff;
        }
        .widget-wrapper .widget-card .widget-header .w-title span { color: #1877f2; }
        .widget-wrapper .widget-card .widget-header .w-status {
            font-size: 0.55rem;
            color: #4a9eff;
            background: rgba(24,119,242,0.1);
            padding: 2px 10px;
            border-radius: 40px;
            border: 1px solid rgba(24,119,242,0.2);
        }
        .widget-wrapper .widget-card .widget-body {
            padding: 0;
            min-height: 300px;
        }

        /* ===== ЛЕНТА ===== */
        #feed-widget .feed-messages {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
        }
        #feed-widget .post {
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        #feed-widget .post .author { color: #ff6b6b; font-weight: 700; font-size: 0.8rem; }
        #feed-widget .post .time { color: #666; font-size: 0.5rem; margin-left: 4px; }
        #feed-widget .post .text { margin: 4px 0; font-size: 0.85rem; line-height: 1.4; }
        #feed-widget .post .img { max-width: 100%; max-height: 180px; border-radius: 8px; margin: 4px 0; border: 1px solid rgba(255,255,255,0.06); cursor: pointer; }
        #feed-widget .post .frame { margin: 4px 0; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.06); }
        #feed-widget .post .frame iframe { width: 100%; height: 180px; border: none; display: block; }
        #feed-widget .post .btns { display: flex; flex-direction: column; gap: 4px; margin: 4px 0; }
        #feed-widget .post .btns .item { display: block; background: linear-gradient(135deg, #ff6b6b, #ff8c8c); border: none; border-radius: 8px; padding: 6px 12px; text-align: center; text-decoration: none; color: #000; font-weight: 700; font-size: 0.75rem; cursor: pointer; }
        #feed-widget .post .hashtags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; padding-top: 4px; border-top: 1px solid rgba(255,255,255,0.06); }
        #feed-widget .post .hashtags .tag { color: #4d96ff; font-size: 0.6rem; background: rgba(255,255,255,0.04); padding: 0 8px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.06); }
        #feed-widget .post .actions { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        #feed-widget .post .actions button { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.06); color: #ccc; padding: 0 10px; border-radius: 40px; font-size: 0.55rem; cursor: pointer; }
        #feed-widget .post .actions .edit { background: rgba(255,107,107,0.15); border-color: rgba(255,107,107,0.2); color: #ff6b6b; }
        #feed-widget .post .actions .del { background: rgba(255,68,68,0.15); border-color: rgba(255,68,68,0.2); color: #ff6666; }
        #feed-widget .input-area { padding: 8px 10px; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.06); }
        #feed-widget .input-area .row { display: flex; gap: 6px; }
        #feed-widget .input-area .row input { flex: 1; padding: 8px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 40px; color: white; font-size: 0.8rem; outline: none; }
        #feed-widget .input-area .row input:focus { border-color: #ff6b6b; }
        #feed-widget .input-area .row button { background: linear-gradient(135deg, #ff6b6b, #ff8c8c); border: none; border-radius: 40px; padding: 0 14px; font-weight: 700; color: #fff; cursor: pointer; font-size: 0.8rem; }
        #feed-widget .file-row { margin-top: 4px; }
        #feed-widget .file-row label { background: rgba(255,255,255,0.06); padding: 2px 12px; border-radius: 40px; font-size: 0.6rem; border: 1px solid rgba(255,255,255,0.06); cursor: pointer; display: inline-block; }
        #feed-widget .file-row .preview { display: none; align-items: center; gap: 6px; background: rgba(0,0,0,0.2); padding: 2px 10px 2px 2px; border-radius: 40px; margin-top: 4px; border: 1px solid rgba(255,255,255,0.06); }
        #feed-widget .file-row .preview.show { display: flex; }
        #feed-widget .file-row .preview img { width: 28px; height: 28px; border-radius: 30px; object-fit: cover; }
        #feed-widget .file-row .preview .pname { font-size: 0.6rem; max-width: 50px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        #feed-widget .file-row .preview .premove { background: rgba(255,68,68,0.2); color: #ff6666; border: none; border-radius: 30px; padding: 0 8px; cursor: pointer; font-size: 0.6rem; }
        #feed-widget .marquee-line { background: rgba(0,0,0,0.2); padding: 4px 0; overflow: hidden; white-space: nowrap; border-radius: 4px; margin-bottom: 4px; border: 1px solid rgba(255,255,255,0.06); }
        #feed-widget .marquee-line span { display: inline-block; animation: scrollM 10s linear infinite; color: #ff6b6b; font-weight: 600; font-size: 0.8rem; padding-left: 16px; }
        @keyframes scrollM { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* ===== ПОДВАЛ ===== */
        .site-footer {
            text-align: center;
            padding: 16px;
            border-top: 1px solid #1a1a1a;
            color: #444;
            font-size: 0.7rem;
        }
        .site-footer a { color: #666; text-decoration: none; }
        .site-footer a:hover { color: #1877f2; }

        /* ===== АДМИН-ТОЧКА ===== */
        .admin-dot {
            position: fixed;
            bottom: 8px;
            right: 8px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,0,0,0.05);
            border: 1px solid rgba(255,0,0,0.02);
            cursor: pointer;
            z-index: 9999;
            transition: 0.3s;
        }
        .admin-dot:hover { background: rgba(255,0,0,0.3); transform: scale(1.5); }
        .admin-dot.active { background: rgba(255,140,0,0.3); border-color: rgba(255,140,0,0.3); }

        /* ===== МОДАЛКА ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .modal.open { display: flex; }
        .modal .modal-box {
            background: #1a1a2a;
            padding: 20px;
            border-radius: 16px;
            max-width: 380px;
            width: 100%;
            border: 1px solid #333;
        }
        .modal .modal-box h3 { color: #fff; margin-bottom: 4px; font-size: 1.1rem; }
        .modal .modal-box .sub { color: #666; font-size: 0.8rem; margin-bottom: 12px; }
        .modal .modal-box input {
            width: 100%; padding: 8px 12px; background: #0f0f0f;
            border: 1px solid #333; border-radius: 8px; color: #fff;
            font-size: 0.9rem; outline: none; margin-bottom: 8px;
        }
        .modal .modal-box input:focus { border-color: #1877f2; }
        .modal .modal-box .btns { display: flex; gap: 8px; justify-content: flex-end; }
        .modal .modal-box .btns button {
            padding: 6px 16px; border-radius: 40px; border: none;
            font-weight: 700; font-size: 0.8rem; cursor: pointer;
        }
        .modal .modal-box .btns .cancel { background: #2a2a2a; color: #aaa; }
        .modal .modal-box .btns .cancel:hover { background: #3a3a3a; }
        .modal .modal-box .btns .save { background: #1877f2; color: #fff; }

        @media (max-width: 640px) {
            .site-header { padding: 8px 12px; }
            .site-header .logo { font-size: 1rem; }
            .site-header .logo .badge { font-size: 0.45rem; padding: 1px 8px; }
            .site-header .site-nav a { font-size: 0.7rem; }
            .site-header .site-nav .btn { font-size: 0.65rem; padding: 3px 10px; }
            .hero h1 { font-size: 1.4rem; }
            .hero p { font-size: 0.8rem; }
            .hero .hero-stats { gap: 12px; }
            .hero .hero-stats .stat .num { font-size: 1rem; }
            .widget-wrapper { padding: 0 8px 16px; }
            .widget-wrapper .widget-card .widget-header .w-title { font-size: 0.75rem; }
            #feed-widget .post .frame iframe { height: 140px; }
            #feed-widget .input-area .row input { font-size: 0.75rem; padding: 6px 12px; }
            #feed-widget .input-area .row button { padding: 0 12px; font-size: 0.7rem; }
            #deepchat-widget .dc-chat-root .dc-chat-panel .dc-messages .dc-msg .dc-msg-frame iframe { height: 160px; }
            #deepchat-widget .dc-chat-root .dc-chat-panel .dc-chat-input .dc-input-row input { font-size: 0.75rem; padding: 6px 12px; }
            #deepchat-widget .dc-chat-root .dc-chat-panel { height: 45vh; min-height: 220px; }
            #deepchat-widget .dc-menu { width: 240px; left: -260px; }
            #deepchat-widget .dc-menu.open { left: 0; }
        }
        @media (max-width: 400px) {
            .hero h1 { font-size: 1.2rem; }
            .site-header .logo { font-size: 0.9rem; }
            .site-header .site-nav a { font-size: 0.6rem; }
            .widget-wrapper .widget-card .widget-header .w-title { font-size: 0.7rem; }
            .widget-wrapper .widget-card .widget-header .w-status { font-size: 0.5rem; padding: 1px 8px; }
            #feed-widget .post .frame iframe { height: 120px; }
            #feed-widget .input-area .row input { font-size: 0.7rem; padding: 4px 10px; }
            #deepchat-widget .dc-chat-root .dc-chat-panel .dc-messages .dc-msg .dc-msg-frame iframe { height: 120px; }
            #deepchat-widget .dc-chat-root .dc-chat-panel .dc-chat-input .dc-input-row input { font-size: 0.7rem; padding: 4px 10px; }
            #deepchat-widget .dc-chat-root .dc-chat-panel { height: 40vh; min-height: 180px; }
        }
    </style>
</head>
<body>

    <!-- ===== ШАПКА ===== -->
    <header class="site-header">
        <div class="logo">
            Deep<span>Chat</span>
            <span class="badge">BETA</span>
        </div>
        <nav class="site-nav">
            <a href="#">Главная</a>
            <a href="#">О нас</a>
            <button class="btn" onclick="document.getElementById('deepchat-widget').scrollIntoView({behavior:'smooth'})">💬 Чат</button>
        </nav>
    </header>

    <!-- ===== ГЕРОЙ ===== -->
    <section class="hero">
        <h1>Общайся в <span>DeepChat</span></h1>
        <p>Создавай комнаты, обсуждай темы, делись ссылками и контентом</p>
        <div class="hero-stats">
            <div class="stat"><div class="num">∞</div><div class="label">Комнат</div></div>
            <div class="stat"><div class="num">🚀</div><div class="label">Мгновенно</div></div>
            <div class="stat"><div class="num">🔒</div><div class="label">Безопасно</div></div>
        </div>
    </section>

    <!-- ===== ЛЕНТА ===== -->
    <div class="widget-wrapper">
        <div class="widget-card">
            <div class="widget-header">
                <div class="w-title">📢 <span>Лента</span> · Объявления</div>
                <div class="w-status">● онлайн</div>
            </div>
            <div class="widget-body">
                <div id="feed-widget"></div>
            </div>
        </div>
    </div>

    <!-- ===== ОСНОВНОЙ ЧАТ ===== -->
    <div class="widget-wrapper">
        <div class="widget-card">
            <div class="widget-header">
                <div class="w-title">💬 <span>DeepChat</span> · Комнаты</div>
                <div class="w-status">● онлайн</div>
            </div>
            <div class="widget-body">
                <div id="deepchat-widget"></div>
            </div>
        </div>
    </div>

    <!-- ===== ПОДВАЛ ===== -->
    <footer class="site-footer">
        <p>DeepChat · Работает на Firebase · <a href="#">Политика</a></p>
    </footer>

    <div class="admin-dot" id="adminDot" onclick="adminLogin()"></div>

    <!-- ===== МОДАЛКА ===== -->
    <div class="modal" id="roomModal">
        <div class="modal-box">
            <h3>📝 Новая комната</h3>
            <div class="sub">Введите название</div>
            <input type="text" id="roomNameInput" placeholder="Например: Общий..." maxlength="30">
            <div class="btns">
                <button class="cancel" onclick="closeRoomModal()">Отмена</button>
                <button class="save" onclick="createRoom()">Создать</button>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ======  FIREBASE  ====== -->
    <!-- ============================================================ -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
    // ================================================================
    // ======  ДВА ПРОЕКТА ======
    // ================================================================

    // ===== ЛЕНТА (deepchat-feed) =====
    const feedConfig = {
        apiKey: "AIzaSyBqUQ__eNLxAYLK2KJFfYqXlvtL-fLqBt8",
        authDomain: "deepchat-feed.firebaseapp.com",
        databaseURL: "https://deepchat-feed-default-rtdb.firebaseio.com",
        projectId: "deepchat-feed",
        storageBucket: "deepchat-feed.firebasestorage.app",
        messagingSenderId: "1046537980904",
        appId: "1:1046537980904:web:c8eaddb9bc8928d731b25d"
    };

    // ===== ОСНОВНОЙ (mychatapp-2c141) =====
    const chatConfig = {
        apiKey: "AIzaSyC81Ow4VPAUcaQGAuJjhtA-OaR8hyqxCtI",
        authDomain: "mychatapp-2c141.firebaseapp.com",
        databaseURL: "https://mychatapp-2c141-default-rtdb.firebaseio.com",
        projectId: "mychatapp-2c141",
        storageBucket: "mychatapp-2c141.firebasestorage.app",
        messagingSenderId: "857322151793",
        appId: "1:857322151793:web:387599e9e6f9cf1454a0d0"
    };

    firebase.initializeApp(feedConfig, 'feed');
    firebase.initializeApp(chatConfig, 'chat');

    const feedDB = firebase.database(firebase.app('feed'));
    const chatDB = firebase.database(firebase.app('chat'));

    const SITE_ID = window.location.hostname.replace(/\./g, '_') || 'default_site';
    let USER = localStorage.getItem('dc_user_' + SITE_ID) || '';
    let IS_ADMIN = localStorage.getItem('dc_admin_' + SITE_ID) === 'true';
    let CURRENT_ROOM = localStorage.getItem('dc_room_' + SITE_ID) || '';

    if (!USER) {
        const nick = prompt('👤 Ваше имя:');
        if (nick && nick.trim()) {
            USER = nick.trim();
            if (USER.length > 24) { alert('Слишком длинное'); return; }
            localStorage.setItem('dc_user_' + SITE_ID, USER);
        }
    }

    // ================================================================
    // ======  АДМИНКА ======
    // ================================================================
    window.adminLogin = function() {
        const pwd = prompt('🏴‍☠️ Пароль:');
        if (pwd === '12345') {
            IS_ADMIN = true;
            localStorage.setItem('dc_admin_' + SITE_ID, 'true');
            document.getElementById('adminDot').classList.add('active');
            alert('✅ Админ-режим включён!');
            loadFeed();
            loadChat();
        } else if (pwd !== null) {
            alert('❌ Неверный пароль!');
        }
    };
    if (IS_ADMIN) {
        document.getElementById('adminDot').classList.add('active');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // ================================================================
    // ======  ЛЕНТА ======
    // ================================================================
    function loadFeed() {
        const root = document.getElementById('feed-widget');
        if (!root) return;
        root.innerHTML = `
            <div class="feed-messages" id="feedMessages"></div>
            <div class="input-area">
                <div class="row">
                    <input type="text" id="feedInput" placeholder="Напиши пост...">
                    <button onclick="sendFeedPost()">→</button>
                </div>
                <div class="file-row">
                    <label for="feedFile">📎 фото</label>
                    <input type="file" id="feedFile" accept="image/*" style="display:none;">
                    <div class="preview" id="feedPreview">
                        <img id="feedPreviewImg">
                        <span class="pname" id="feedPreviewName"></span>
                        <button class="premove" onclick="removeFeedImage()">✕</button>
                    </div>
                </div>
            </div>
        `;

        const FEED_ROOM = 'feed_room';
        const msgRef = feedDB.ref('sites/' + SITE_ID + '/rooms/' + FEED_ROOM + '/messages');

        feedDB.ref('sites/' + SITE_ID + '/rooms/' + FEED_ROOM).once('value', snap => {
            if (!snap.exists()) {
                feedDB.ref('sites/' + SITE_ID + '/rooms/' + FEED_ROOM).set({
                    name: '📢 Лента объявлений',
                    marquee: '🏳️‍🌈 Добро пожаловать в ленту!',
                    postText: 'Здесь публикуются объявления и посты.',
                    link: null,
                    buttons: [],
                    hashtags: ['#LGBTQ', '#Community'],
                    createdAt: Date.now(),
                    createdBy: 'Admin',
                    count: 0,
                    approved: true
                });
            }
        });

        window.sendFeedPost = function() {
            const input = document.getElementById('feedInput');
            if (!input) return;
            const text = input.value.trim();
            const preview = document.getElementById('feedPreview');
            const previewImg = document.getElementById('feedPreviewImg');
            const pendingImage = preview && preview.classList.contains('show') ? previewImg.src : null;
            if (!text && !pendingImage) return;

            const data = {
                nick: USER || 'Гость',
                text: text || '📷',
                time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
                timestamp: Date.now(),
                likes: 0,
                img: pendingImage || null,
                link: null,
                marquee: null,
                buttons: [],
                hashtags: [],
                edited: false
            };

            const linkMatch = (text || '').match(/(https?:\/\/[^\s]+)/);
            if (linkMatch) data.link = linkMatch[1];

            msgRef.push(data);
            input.value = '';
            removeFeedImage();
        };

        window.removeFeedImage = function() {
            document.getElementById('feedPreview').classList.remove('show');
            document.getElementById('feedFile').value = '';
        };

        document.getElementById('feedFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                if (file.size > 2 * 1024 * 1024) { alert('Максимум 2MB'); return; }
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('feedPreviewImg').src = ev.target.result;
                    document.getElementById('feedPreviewName').textContent = file.name.slice(0, 14);
                    document.getElementById('feedPreview').classList.add('show');
                };
                reader.readAsDataURL(file);
            }
        });

        msgRef.orderByChild('timestamp').on('value', snap => {
            const messagesDiv = document.getElementById('feedMessages');
            if (!messagesDiv) return;
            messagesDiv.innerHTML = '';
            snap.forEach(s => {
                const m = s.val();
                m.id = s.key;
                renderFeedPost(m);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });

        function renderFeedPost(m) {
            const messagesDiv = document.getElementById('feedMessages');
            if (!messagesDiv) return;
            const div = document.createElement('div');
            div.className = 'post';

            let marqueeHtml = '';
            if (m.marquee) {
                marqueeHtml = `<div class="marquee-line"><span>${escapeHtml(m.marquee)}</span></div>`;
            }

            let textHtml = escapeHtml(m.text || '');
            const linkMatch = (m.text || '').match(/(https?:\/\/[^\s]+)/);
            if (linkMatch && m.link) {
                textHtml = textHtml.replace(linkMatch[1], `<span style="color:#555;font-size:0.7rem;">${linkMatch[1]}</span>`);
            }

            let imgHtml = '';
            if (m.img) {
                imgHtml = `<img class="img" src="${m.img}" onclick="window.open(this.src)">`;
            }

            let buttonsHtml = '';
            if (m.buttons && m.buttons.length > 0) {
                buttonsHtml = '<div class="btns">';
                m.buttons.forEach(btn => {
                    if (btn.url) {
                        buttonsHtml += `<a href="${escapeHtml(btn.url)}" target="_blank" class="item">${escapeHtml(btn.label || '🔗 Перейти')}</a>`;
                    }
                });
                buttonsHtml += '</div>';
            }

            let frameHtml = '';
            if (m.link) {
                frameHtml = `<div class="frame"><iframe src="${m.link}" sandbox="allow-scripts allow-same-origin allow-popups"></iframe></div>`;
            }

            let hashtagsHtml = '';
            if (m.hashtags && m.hashtags.length > 0) {
                hashtagsHtml = '<div class="hashtags">';
                m.hashtags.forEach(tag => {
                    hashtagsHtml += `<span class="tag">${escapeHtml(tag)}</span>`;
                });
                hashtagsHtml += '</div>';
            }

            let actionsHtml = `
                <button onclick="likeFeedPost('${m.id}')">👍 ${m.likes || 0}</button>
            `;
            if (m.nick === USER) {
                actionsHtml += `<button class="edit" onclick="editFeedPost('${m.id}')">✏️ ред.</button>`;
            }
            if (m.nick === USER || IS_ADMIN) {
                actionsHtml += `<button class="del" onclick="deleteFeedPost('${m.id}')">🗑</button>`;
            }

            div.innerHTML = `
                ${marqueeHtml}
                <div>
                    <span class="author">${escapeHtml(m.nick)}</span>
                    <span class="time">${m.time || ''}</span>
                    ${m.edited ? ' <span style="color:#666;font-size:0.45rem;">(ред.)</span>' : ''}
                </div>
                <div class="text">${textHtml}</div>
                ${imgHtml}
                ${buttonsHtml}
                ${frameHtml}
                ${hashtagsHtml}
                <div class="actions">${actionsHtml}</div>
            `;

            messagesDiv.appendChild(div);
        }

        window.likeFeedPost = function(id) {
            const key = `liked_${id}_${USER}`;
            if (localStorage.getItem(key)) return;
            msgRef.child(id + '/likes').transaction(v => (v || 0) + 1);
            localStorage.setItem(key, 'true');
        };

        window.deleteFeedPost = function(id) {
            if (!confirm('Удалить пост?')) return;
            msgRef.child(id).remove();
        };

        window.editFeedPost = function(id) {
            const newText = prompt('Редактировать текст:');
            if (newText !== null) {
                msgRef.child(id).update({ text: newText, edited: true, editedAt: Date.now() });
            }
        };

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'feedInput') {
                sendFeedPost();
            }
        });
    }

        // ================================================================
        // ======  ФУНКЦИИ ======
        // ================================================================

        window.dcToggleMenu = function() {
            const menu = document.getElementById('dcMenu');
            const overlay = document.getElementById('dcOverlay');
            menu.classList.toggle('open');
            overlay.classList.toggle('show');
        };

        window.dcGoHome = function() {
            CURRENT_ROOM = '';
            localStorage.removeItem('dc_room_' + SITE_ID);
            document.getElementById('dcHomePage').style.display = 'flex';
            document.getElementById('dcChatContainer').style.display = 'none';
            document.querySelectorAll('.dc-room').forEach(el => el.classList.remove('active'));
            dcUpdateHomeRooms();
            dcToggleMenu();
        };

        function dcUpdateHomeRooms() {
            const container = document.getElementById('dcHomeRooms');
            chatDB.ref('sites/' + SITE_ID + '/rooms').once('value', snap => {
                const data = snap.val() || {};
                const keys = Object.keys(data);
                if (keys.length === 0) {
                    container.innerHTML = '<div style="color:#444;font-size:0.85rem;">Нет комнат</div>';
                    return;
                }
                let html = '';
                keys.forEach(key => {
                    const room = data[key];
                    html += `<div class="dc-home-room" onclick="dcSelectRoom('${key}')"># ${room.name || 'Без названия'}</div>`;
                });
                container.innerHTML = html;
            });
        }

        function dcLoadRooms() {
            chatDB.ref('sites/' + SITE_ID + '/rooms').orderByChild('createdAt').on('value', snap => {
                const data = snap.val() || {};
                const keys = Object.keys(data).sort((a, b) => (data[a].createdAt || 0) - (data[b].createdAt || 0));
                const list = document.getElementById('dcRoomList');
                if (keys.length === 0) {
                    list.innerHTML = '<div style="text-align:center;color:#444;padding:16px;font-size:0.8rem;">Нет комнат</div>';
                    return;
                }
                let html = '';
                keys.forEach(key => {
                    const room = data[key];
                    const active = key === CURRENT_ROOM ? 'active' : '';
                    html += `<div class="dc-room ${active}" onclick="dcSelectRoom('${key}')">
                        <span>#</span>
                        <span class="dc-rname">${room.name || 'Без названия'}</span>
                        <span class="dc-rcount">${room.count || 0}</span>
                    </div>`;
                });
                list.innerHTML = html;
                dcUpdateHomeRooms();
                if (!CURRENT_ROOM && keys.length > 0) {
                    // Остаёмся на главной
                }
            });
        }

        window.dcSelectRoom = function(roomId) {
            CURRENT_ROOM = roomId;
            localStorage.setItem('dc_room_' + SITE_ID, roomId);
            document.getElementById('dcHomePage').style.display = 'none';
            document.getElementById('dcChatContainer').style.display = 'block';
            dcLoadDeepChat(roomId);
            document.querySelectorAll('.dc-room').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.dc-room').forEach(el => {
                if (el.getAttribute('onclick').includes(roomId)) el.classList.add('active');
            });
            dcToggleMenu();
        };

        // ================================================================
        // ======  ЗАГРУЗКА ЧАТА ======
        // ================================================================
        function dcLoadDeepChat(roomId) {
            const container = document.getElementById('dcChatContainer');
            container.innerHTML = '';

            const chatRoot = document.createElement('div');
            chatRoot.className = 'dc-chat-root';
            container.appendChild(chatRoot);

            chatRoot.innerHTML = `
                <div class="dc-chat-header">
                    <span>🌀 DeepChat</span>
                    <span class="dc-chat-sub">📝 посты</span>
                </div>
                <div class="dc-chat-panel">
                    <div class="dc-messages" id="dcMessages"></div>
                    <div class="dc-chat-input">
                        <div class="dc-input-row">
                            <input type="text" id="dcMsgInput" placeholder="Напиши пост или ссылку...">
                            <button onclick="dcSendMessage()">→</button>
                        </div>
                        <div class="dc-file-row">
                            <label for="dcFileInput">📎 фото</label>
                            <input type="file" id="dcFileInput" accept="image/*" style="display:none;">
                            <div class="dc-preview" id="dcPreview">
                                <img id="dcPreviewImg">
                                <span class="dc-preview-name" id="dcPreviewName"></span>
                                <button class="dc-preview-remove" onclick="dcRemoveImage()">✕</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            let currentUser = USER;
            let editingId = null;

            const msgRef = chatDB.ref('sites/' + SITE_ID + '/rooms/' + roomId + '/messages');

            window.dcSendMessage = function() {
                const input = document.getElementById('dcMsgInput');
                if (!input) return;
                const text = input.value.trim();
                const preview = document.getElementById('dcPreview');
                const previewImg = document.getElementById('dcPreviewImg');
                const pendingImage = preview && preview.classList.contains('show') ? previewImg.src : null;
                if (!text && !pendingImage) return;

                const data = {
                    nick: currentUser,
                    text: text || '📷',
                    time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
                    timestamp: Date.now(),
                    likes: 0,
                    img: pendingImage || null,
                    link: null,
                    marquee: null,
                    buttons: [],
                    hashtags: [],
                    edited: false
                };

                const linkMatch = (text || '').match(/(https?:\/\/[^\s]+)/);
                if (linkMatch) {
                    data.link = linkMatch[1];
                }

                msgRef.push(data);
                input.value = '';
                dcRemoveImage();
            };

            document.getElementById('dcFileInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    if (file.size > 2 * 1024 * 1024) { alert('Максимум 2MB'); return; }
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        document.getElementById('dcPreviewImg').src = ev.target.result;
                        document.getElementById('dcPreviewName').textContent = file.name.slice(0, 14);
                        document.getElementById('dcPreview').classList.add('show');
                    };
                    reader.readAsDataURL(file);
                }
            });

            window.dcRemoveImage = function() {
                document.getElementById('dcPreview').classList.remove('show');
                document.getElementById('dcFileInput').value = '';
            };

            msgRef.orderByChild('timestamp').on('value', snap => {
                const messagesDiv = document.getElementById('dcMessages');
                if (!messagesDiv) return;
                messagesDiv.innerHTML = '';
                snap.forEach(s => {
                    const m = s.val();
                    m.id = s.key;
                    renderMessage(m);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });

            function renderMessage(m) {
                const messagesDiv = document.getElementById('dcMessages');
                if (!messagesDiv) return;

                const div = document.createElement('div');
                div.className = 'dc-msg';

                let marqueeHtml = '';
                if (m.marquee) {
                    marqueeHtml = `<div class="dc-marquee"><span>${escapeHtml(m.marquee)}</span></div>`;
                }

                let textHtml = escapeHtml(m.text || '');
                const linkMatch = (m.text || '').match(/(https?:\/\/[^\s]+)/);
                if (linkMatch && m.link) {
                    textHtml = textHtml.replace(linkMatch[1], `<span style="color:#555;font-size:0.75rem;">${linkMatch[1]}</span>`);
                }

                let imgHtml = '';
                if (m.img) {
                    imgHtml = `<img class="dc-msg-img" src="${m.img}" onclick="window.open(this.src)">`;
                }

                let buttonsHtml = '';
                if (m.buttons && m.buttons.length > 0) {
                    buttonsHtml = '<div class="dc-msg-buttons">';
                    m.buttons.forEach(btn => {
                        if (btn.url) {
                            buttonsHtml += `<a href="${escapeHtml(btn.url)}" target="_blank" class="dc-btn-item">${escapeHtml(btn.label || '🔗 Перейти')}</a>`;
                        }
                    });
                    buttonsHtml += '</div>';
                }

                let frameHtml = '';
                if (m.link) {
                    frameHtml = `<div class="dc-msg-frame"><iframe src="${m.link}" sandbox="allow-scripts allow-same-origin allow-popups"></iframe></div>`;
                }

                let hashtagsHtml = '';
                if (m.hashtags && m.hashtags.length > 0) {
                    hashtagsHtml = '<div class="dc-msg-hashtags">';
                    m.hashtags.forEach(tag => {
                        hashtagsHtml += `<span class="dc-tag">${escapeHtml(tag)}</span>`;
                    });
                    hashtagsHtml += '</div>';
                }

                let actionsHtml = `
                    <button onclick="dcLikeMsg('${m.id}')">👍 ${m.likes || 0}</button>
                    <button onclick="dcReplyMsg('${m.id}','${escapeHtml(m.nick)}')">💬 ответ</button>
                `;
                if (m.nick === currentUser) {
                    actionsHtml += `<button class="dc-edit-btn" onclick="dcOpenEdit('${m.id}')">✏️ ред.</button>`;
                }
                if (m.nick === currentUser || IS_ADMIN) {
                    actionsHtml += `<button class="dc-del-btn" onclick="dcDeleteMsg('${m.id}')">🗑</button>`;
                }

                div.innerHTML = `
                    ${marqueeHtml}
                    <div>
                        <span class="dc-msg-author">${escapeHtml(m.nick)}</span>
                        <span class="dc-msg-time">${m.time || ''}</span>
                        ${m.edited ? ' <span style="color:#666;font-size:0.5rem;">(ред.)</span>' : ''}
                    </div>
                    <div class="dc-msg-text">${textHtml}</div>
                    ${imgHtml}
                    ${buttonsHtml}
                    ${frameHtml}
                    ${hashtagsHtml}
                    <div class="dc-msg-actions">${actionsHtml}</div>
                `;

                messagesDiv.appendChild(div);
            }

            window.dcLikeMsg = function(id) {
                const key = `liked_${id}_${currentUser}`;
                if (localStorage.getItem(key)) return;
                msgRef.child(id + '/likes').transaction(v => (v || 0) + 1);
                localStorage.setItem(key, 'true');
            };

            window.dcReplyMsg = function(id, nick) {
                const input = document.getElementById('dcMsgInput');
                if (input) {
                    input.value = `@${nick} `;
                    input.focus();
                }
            };

            window.dcDeleteMsg = function(id) {
                if (!confirm('Удалить этот пост?')) return;
                msgRef.child(id).remove();
            };

            window.dcOpenEdit = function(id) {
                editingId = id;
                const modal = document.createElement('div');
                modal.className = 'dc-edit-modal open';
                modal.id = 'dcEditModal';
                modal.innerHTML = `
                    <div class="dc-edit-box">
                        <h2>✏️ Редактировать</h2>
                        <input type="text" id="dcEditMarquee" placeholder="Бегущая строка">
                        <textarea id="dcEditText" placeholder="Текст"></textarea>
                        <input type="url" id="dcEditLink" placeholder="Ссылка (iframe)">
                        <input type="text" id="dcEditHashtags" placeholder="#hashtags">
                        <div class="dc-edit-label">🔘 Кнопки</div>
                        <div id="dcEditButtonsContainer"></div>
                        <button class="dc-add-btn" onclick="dcAddButtonField()">➕ Кнопку</button>
                        <div class="dc-edit-actions">
                            <button class="dc-save-btn" onclick="dcSaveEdit()">💾 Сохранить</button>
                            <button class="dc-cancel-btn" onclick="dcCloseEdit()">✕ Отмена</button>
                        </div>
                        <button class="dc-delete-btn" onclick="dcDeletePost()">🗑 Удалить пост</button>
                    </div>
                `;
                document.body.appendChild(modal);

                msgRef.child(id).once('value', snap => {
                    const m = snap.val();
                    if (!m) return;
                    document.getElementById('dcEditMarquee').value = m.marquee || '';
                    document.getElementById('dcEditText').value = m.text || '';
                    document.getElementById('dcEditLink').value = m.link || '';
                    document.getElementById('dcEditHashtags').value = (m.hashtags || []).join(' ');

                    const container = document.getElementById('dcEditButtonsContainer');
                    container.innerHTML = '';
                    const btns = m.buttons || [];
                    btns.forEach(btn => dcAddButtonField(btn.label, btn.url));
                    if (btns.length === 0) dcAddButtonField('', '');
                });
            };

            window.dcAddButtonField = function(label = '', url = '') {
                const container = document.getElementById('dcEditButtonsContainer');
                const div = document.createElement('div');
                div.className = 'dc-btn-group';
                div.innerHTML = `
                    <input class="dc-btn-label" placeholder="Текст" value="${escapeHtml(label)}">
                    <input class="dc-btn-url" placeholder="Ссылка" value="${escapeHtml(url)}">
                    <button class="dc-btn-remove" onclick="dcRemoveButtonField(this)">✕</button>
                `;
                container.appendChild(div);
            };

            window.dcRemoveButtonField = function(btn) {
                const group = btn.parentElement;
                if (document.getElementById('dcEditButtonsContainer').children.length > 1) {
                    group.remove();
                } else {
                    group.querySelector('.dc-btn-label').value = '';
                    group.querySelector('.dc-btn-url').value = '';
                }
            };

            window.dcSaveEdit = function() {
                if (!editingId) return;

                const marquee = document.getElementById('dcEditMarquee').value.trim();
                const text = document.getElementById('dcEditText').value.trim();
                const link = document.getElementById('dcEditLink').value.trim();
                const hashtagsRaw = document.getElementById('dcEditHashtags').value.trim();
                const hashtags = hashtagsRaw ? hashtagsRaw.split(/\s+/).filter(t => t.startsWith('#')) : [];

                const buttons = [];
                document.querySelectorAll('#dcEditButtonsContainer .dc-btn-group').forEach(g => {
                    const label = g.querySelector('.dc-btn-label').value.trim();
                    const url = g.querySelector('.dc-btn-url').value.trim();
                    if (url) buttons.push({ label: label || '🔗 Перейти', url });
                });

                const updates = {
                    marquee: marquee || null,
                    text: text || '📝',
                    link: link || null,
                    buttons: buttons,
                    hashtags: hashtags,
                    edited: true,
                    editedAt: Date.now()
                };

                msgRef.child(editingId).update(updates);
                dcCloseEdit();
            };

            window.dcDeletePost = function() {
                if (!editingId) return;
                if (confirm('Удалить пост навсегда?')) {
                    msgRef.child(editingId).remove();
                    dcCloseEdit();
                }
            };

            window.dcCloseEdit = function() {
                const modal = document.getElementById('dcEditModal');
                if (modal) modal.remove();
                editingId = null;
            };

            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'dcMsgInput') {
                    dcSendMessage();
                }
            });

            console.log('💬 Чат загружен для комнаты:', roomId);
        }

        // ================================================================
        // ======  КОМНАТЫ ======
        // ================================================================
        window.dcOpenCreateRoom = function() {
            if (!IS_ADMIN) { alert('⛔ Только для админа!'); return; }
            document.getElementById('dcRoomModal').classList.add('open');
            document.getElementById('dcRoomNameInput').value = '';
            document.getElementById('dcRoomNameInput').focus();
        };

        window.dcCloseRoomModal = function() {
            document.getElementById('dcRoomModal').classList.remove('open');
        };

        window.dcCreateRoom = function() {
            const name = document.getElementById('dcRoomNameInput').value.trim();
            if (!name) { alert('⚠️ Введите название'); return; }
            if (name.length < 2) { alert('⚠️ Минимум 2 символа'); return; }
            chatDB.ref('sites/' + SITE_ID + '/rooms').push({
                name: name,
                createdAt: Date.now(),
                count: 0
            }).then(() => {
                dcCloseRoomModal();
                alert('✅ Комната "' + name + '" создана!');
                dcLoadRooms();
            }).catch(e => alert('❌ ' + e.message));
        };

        // ================================================================
        // ======  АДМИНКА ======
        // ================================================================
        window.dcAdminLogin = function() {
            document.getElementById('dcAdminModal').classList.add('open');
            document.getElementById('dcAdminPassInput').value = '';
            document.getElementById('dcAdminPassInput').focus();
        };

        window.dcCloseAdminModal = function() {
            document.getElementById('dcAdminModal').classList.remove('open');
        };

        window.dcCheckAdminPass = function() {
            const pass = document.getElementById('dcAdminPassInput').value.trim();
            if (pass === '12345') {
                IS_ADMIN = true;
                localStorage.setItem('dc_admin_' + SITE_ID, 'true');
                document.getElementById('dcAdminDot').classList.add('active');
                document.getElementById('dcCreateBtn').classList.add('show');
                dcCloseAdminModal();
                alert('🏴‍☠️ Админ-режим включён!');
                dcLoadRooms();
            } else {
                alert('❌ Неверный пароль!');
                document.getElementById('dcAdminPassInput').value = '';
                document.getElementById('dcAdminPassInput').focus();
            }
        };

        // ================================================================
        // ======  ЗАПУСК  ======
        // ================================================================
        dcLoadRooms();
        if (IS_ADMIN) {
            document.getElementById('dcAdminDot').classList.add('active');
            document.getElementById('dcCreateBtn').classList.add('show');
        }
        console.log('💬 DeepChat Widget загружен!');
        console.log('🏷️ Сайт:', SITE_ID);
        console.log('👤 Пользователь:', USER || 'не задан');
        console.log('🏴‍☠️ Админ-пароль: 12345 (точка в правом нижнем углу)');
    }

    // ================================================================
    // ======  ЗАПУСК ВСЕГО ======
    // ================================================================
    loadFeed();
    loadChat();
    console.log('📢 Лента (deepchat-feed) загружена!');
    console.log('💬 Чат (mychatapp-2c141) загружен!');
    </script>
