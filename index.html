<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>DeepChat · Сообщество</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== ШАПКА С МЕНЮ ===== */
        .site-header {
            background: linear-gradient(135deg, #0f0f18, #0a0a0a);
            border-bottom: 1px solid #1a1a1a;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .site-header .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .site-header .menu-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }
        .site-header .menu-btn:hover { color: #1877f2; }
        .site-header .logo {
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .site-header .logo span { color: #1877f2; }
        .site-header .logo .badge {
            font-size: 0.5rem;
            background: #1877f2;
            color: #fff;
            padding: 2px 10px;
            border-radius: 40px;
            font-weight: 600;
        }
        .site-header .user {
            font-size: 0.7rem;
            color: #666;
            background: #1a1a1a;
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid #2a2a2a;
        }

        /* ===== МЕНЮ (выезжает слева) ===== */
        .side-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: #12121a;
            border-right: 1px solid #2a2a2a;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            overflow-y: auto;
            padding: 16px 12px;
        }
        .side-menu.open { left: 0; }
        .side-menu .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid #222;
        }
        .side-menu .menu-header span { color: #1877f2; font-weight: 700; font-size: 1.1rem; }
        .side-menu .menu-header .close-btn {
            background: none; border: none; color: #666; font-size: 1.4rem; cursor: pointer;
        }
        .side-menu .menu-header .close-btn:hover { color: #fff; }
        .side-menu .user-block {
            margin: 12px 0;
            padding: 8px 12px;
            background: #1a1a2a;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .side-menu .user-block .avatar { font-size: 1.4rem; }
        .side-menu .user-block .name { font-weight: 600; font-size: 0.9rem; }
        .side-menu .user-block .status { font-size: 0.6rem; color: #666; }
        .side-menu .room-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 8px;
        }
        .side-menu .room-list .room-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            color: #ccc;
            border: 1px solid transparent;
            transition: background 0.2s;
        }
        .side-menu .room-list .room-item:hover {
            background: #1a1a2a;
            border-color: #2a2a2a;
        }
        .side-menu .room-list .room-item.active {
            background: #1a1a2a;
            border-color: #1877f2;
        }
        .side-menu .room-list .room-item .rname { font-size: 0.9rem; }
        .side-menu .room-list .room-item .rcount {
            margin-left: auto;
            font-size: 0.6rem;
            color: #555;
            background: #1a1a1a;
            padding: 0 10px;
            border-radius: 40px;
        }
        .side-menu .menu-footer {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #1a1a1a;
        }
        .side-menu .menu-footer .create-btn {
            display: none;
            width: 100%;
            background: #1877f2;
            border: none;
            color: #fff;
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
        }
        .side-menu .menu-footer .create-btn:hover { background: #4a9eff; }
        .side-menu .menu-footer .create-btn.show { display: block; }

        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .overlay.show { display: block; opacity: 1; }

        /* ===== ГЕРОЙ ===== */
        .hero {
            text-align: center;
            padding: 30px 20px 16px;
            max-width: 800px;
            margin: 0 auto;
        }
        .hero h1 { font-size: 2rem; font-weight: 800; line-height: 1.2; }
        .hero h1 span { color: #1877f2; }
        .hero p { color: #888; font-size: 0.95rem; margin-top: 6px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .hero .hero-stats { display: flex; justify-content: center; gap: 24px; margin-top: 16px; flex-wrap: wrap; }
        .hero .hero-stats .stat { text-align: center; }
        .hero .hero-stats .stat .num { font-size: 1.3rem; font-weight: 700; color: #fff; }
        .hero .hero-stats .stat .label { font-size: 0.65rem; color: #666; }

        /* ===== ВИДЖЕТЫ ===== */
        .widget-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 12px 40px;
        }
        .widget-wrapper .widget-card {
            background: #0f0f18;
            border: 1px solid #1a1a1a;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            margin-bottom: 16px;
        }
        .widget-wrapper .widget-card .widget-header {
            padding: 10px 14px;
            background: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .widget-wrapper .widget-card .widget-header .w-title {
            font-weight: 700;
            font-size: 0.9rem;
            color: #fff;
        }
        .widget-wrapper .widget-card .widget-header .w-title span { color: #1877f2; }
        .widget-wrapper .widget-card .widget-header .w-status {
            font-size: 0.6rem;
            color: #4a9eff;
            background: rgba(24,119,242,0.1);
            padding: 2px 12px;
            border-radius: 40px;
            border: 1px solid rgba(24,119,242,0.2);
        }
        .widget-wrapper .widget-card .widget-body { padding: 0; min-height: 300px; }

        /* ===== ЛЕНТА ===== */
        #feed-widget .feed-messages {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }
        #feed-widget .post {
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            padding: 12px 14px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        #feed-widget .post .author { color: #ff6b6b; font-weight: 700; font-size: 0.85rem; }
        #feed-widget .post .time { color: #666; font-size: 0.55rem; margin-left: 6px; }
        #feed-widget .post .text { margin: 4px 0; font-size: 0.9rem; line-height: 1.4; }
        #feed-widget .post .img { max-width: 100%; max-height: 200px; border-radius: 10px; margin: 4px 0; border: 1px solid rgba(255,255,255,0.06); cursor: pointer; }
        #feed-widget .post .frame { margin: 6px 0; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.06); }
        #feed-widget .post .frame iframe { width: 100%; height: 220px; border: none; display: block; }
        #feed-widget .post .btns { display: flex; flex-direction: column; gap: 4px; margin: 6px 0; }
        #feed-widget .post .btns .item { display: block; background: linear-gradient(135deg, #ff6b6b, #ff8c8c); border: none; border-radius: 10px; padding: 6px 14px; text-align: center; text-decoration: none; color: #000; font-weight: 700; font-size: 0.8rem; cursor: pointer; }
        #feed-widget .post .hashtags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.06); }
        #feed-widget .post .hashtags .tag { color: #4d96ff; font-size: 0.65rem; background: rgba(255,255,255,0.04); padding: 0 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.06); }
        #feed-widget .post .actions { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
        #feed-widget .post .actions button { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.06); color: #ccc; padding: 0 12px; border-radius: 40px; font-size: 0.6rem; cursor: pointer; }
        #feed-widget .post .actions .edit { background: rgba(255,107,107,0.15); border-color: rgba(255,107,107,0.2); color: #ff6b6b; }
        #feed-widget .post .actions .del { background: rgba(255,68,68,0.15); border-color: rgba(255,68,68,0.2); color: #ff6666; }
        #feed-widget .input-area { padding: 10px 12px; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.06); }
        #feed-widget .input-area .row { display: flex; gap: 8px; }
        #feed-widget .input-area .row input { flex: 1; padding: 10px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 40px; color: white; font-size: 0.85rem; outline: none; }
        #feed-widget .input-area .row input:focus { border-color: #ff6b6b; }
        #feed-widget .input-area .row button { background: linear-gradient(135deg, #ff6b6b, #ff8c8c); border: none; border-radius: 40px; padding: 0 18px; font-weight: 700; color: #fff; cursor: pointer; }
        #feed-widget .file-row { margin-top: 6px; }
        #feed-widget .file-row label { background: rgba(255,255,255,0.06); padding: 2px 14px; border-radius: 40px; font-size: 0.65rem; border: 1px solid rgba(255,255,255,0.06); cursor: pointer; display: inline-block; }
        #feed-widget .file-row .preview { display: none; align-items: center; gap: 8px; background: rgba(0,0,0,0.2); padding: 2px 12px 2px 2px; border-radius: 40px; margin-top: 4px; border: 1px solid rgba(255,255,255,0.06); }
        #feed-widget .file-row .preview.show { display: flex; }
        #feed-widget .file-row .preview img { width: 32px; height: 32px; border-radius: 30px; object-fit: cover; }
        #feed-widget .file-row .preview .pname { font-size: 0.65rem; max-width: 60px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        #feed-widget .file-row .preview .premove { background: rgba(255,68,68,0.2); color: #ff6666; border: none; border-radius: 30px; padding: 0 10px; cursor: pointer; }
        #feed-widget .marquee-line { background: rgba(0,0,0,0.2); padding: 4px 0; overflow: hidden; white-space: nowrap; border-radius: 6px; margin-bottom: 6px; border: 1px solid rgba(255,255,255,0.06); }
        #feed-widget .marquee-line span { display: inline-block; animation: scrollM 10s linear infinite; color: #ff6b6b; font-weight: 600; font-size: 0.85rem; padding-left: 16px; }
        @keyframes scrollM { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* ===== ПОДВАЛ ===== */
        .site-footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid #1a1a1a;
            color: #444;
            font-size: 0.75rem;
        }
        .site-footer a { color: #666; text-decoration: none; }
        .site-footer a:hover { color: #1877f2; }

        /* ===== АДМИН-ТОЧКА ===== */
        .admin-dot {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255,0,0,0.05);
            border: 1px solid rgba(255,0,0,0.02);
            cursor: pointer;
            z-index: 9999;
            transition: 0.3s;
        }
        .admin-dot:hover { background: rgba(255,0,0,0.3); transform: scale(1.5); }
        .admin-dot.active { background: rgba(255,140,0,0.3); border-color: rgba(255,140,0,0.3); }

        /* ===== МОДАЛКА ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.open { display: flex; }
        .modal .modal-box {
            background: #1a1a2a;
            padding: 24px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            border: 1px solid #333;
        }
        .modal .modal-box h3 { color: #fff; margin-bottom: 4px; }
        .modal .modal-box .sub { color: #666; font-size: 0.85rem; margin-bottom: 14px; }
        .modal .modal-box input {
            width: 100%; padding: 10px 14px; background: #0f0f0f;
            border: 1px solid #333; border-radius: 10px; color: #fff;
            font-size: 0.95rem; outline: none; margin-bottom: 10px;
        }
        .modal .modal-box input:focus { border-color: #1877f2; }
        .modal .modal-box .btns { display: flex; gap: 10px; justify-content: flex-end; }
        .modal .modal-box .btns button {
            padding: 8px 20px; border-radius: 40px; border: none;
            font-weight: 700; font-size: 0.9rem; cursor: pointer;
        }
        .modal .modal-box .btns .cancel { background: #2a2a2a; color: #aaa; }
        .modal .modal-box .btns .cancel:hover { background: #3a3a3a; }
        .modal .modal-box .btns .save { background: #1877f2; color: #fff; }

        @media (max-width: 640px) {
            .site-header { padding: 10px 12px; }
            .site-header .logo { font-size: 1rem; }
            .site-header .logo .badge { font-size: 0.45rem; padding: 1px 8px; }
            .hero h1 { font-size: 1.5rem; }
            .hero p { font-size: 0.85rem; }
            .hero .hero-stats { gap: 12px; }
            .hero .hero-stats .stat .num { font-size: 1.1rem; }
            .widget-wrapper { padding: 0 8px 24px; }
            .side-menu { width: 260px; left: -280px; }
            #feed-widget .post .frame iframe { height: 160px; }
            #feed-widget .input-area .row input { font-size: 0.75rem; padding: 6px 12px; }
            #feed-widget .input-area .row button { padding: 0 14px; font-size: 0.8rem; }
        }
        @media (max-width: 400px) {
            .hero h1 { font-size: 1.2rem; }
            .site-header .user { font-size: 0.6rem; padding: 2px 10px; }
            .side-menu { width: 240px; left: -260px; }
            #feed-widget .post .frame iframe { height: 140px; }
        }
    </style>
</head>
<body>

    <!-- ===== ШАПКА С МЕНЮ ===== -->
    <header class="site-header">
        <div class="left">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <div class="logo">
                Deep<span>Chat</span>
                <span class="badge">BETA</span>
            </div>
        </div>
        <div class="user" id="topUser">👤 Гость</div>
    </header>

    <!-- ===== МЕНЮ (выезжает) ===== -->
    <div class="side-menu" id="sideMenu">
        <div class="menu-header">
            <span>💬 Комнаты</span>
            <button class="close-btn" onclick="toggleMenu()">✕</button>
        </div>
        <div class="user-block">
            <div class="avatar">👤</div>
            <div>
                <div class="name" id="menuUserName">Гость</div>
                <div class="status">онлайн</div>
            </div>
        </div>
        <div class="room-list" id="roomList">
            <div style="text-align:center;color:#444;padding:16px;font-size:0.8rem;">Загрузка...</div>
        </div>
        <div class="menu-footer">
            <button class="create-btn" id="createRoomBtn" onclick="openCreateRoom()">➕ Создать комнату</button>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <!-- ===== ГЕРОЙ ===== -->
    <section class="hero">
        <h1>Общайся в <span>DeepChat</span></h1>
        <p>Создавай комнаты, обсуждай темы, делись ссылками и контентом</p>
        <div class="hero-stats">
            <div class="stat"><div class="num">∞</div><div class="label">Комнат</div></div>
            <div class="stat"><div class="num">🚀</div><div class="label">Мгновенно</div></div>
            <div class="stat"><div class="num">🔒</div><div class="label">Безопасно</div></div>
        </div>
    </section>

    <!-- ===== ЛЕНТА ===== -->
    <div class="widget-wrapper">
        <div class="widget-card">
            <div class="widget-header">
                <div class="w-title">📢 <span>Лента</span> · Объявления</div>
                <div class="w-status">● онлайн</div>
            </div>
            <div class="widget-body">
                <div id="feed-widget"></div>
            </div>
        </div>
    </div>

    <!-- ===== ПОДВАЛ ===== -->
    <footer class="site-footer">
        <p>DeepChat · Работает на Firebase · <a href="#">Политика</a></p>
    </footer>

    <div class="admin-dot" id="adminDot" onclick="adminLogin()"></div>

    <!-- ===== МОДАЛКА ===== -->
    <div class="modal" id="roomModal">
        <div class="modal-box">
            <h3>📝 Новая комната</h3>
            <div class="sub">Введите название</div>
            <input type="text" id="roomNameInput" placeholder="Например: Общий..." maxlength="30">
            <div class="btns">
                <button class="cancel" onclick="closeRoomModal()">Отмена</button>
                <button class="save" onclick="createRoom()">Создать</button>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ======  FIREBASE  ====== -->
    <!-- ============================================================ -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
    // ================================================================
    // ======  ДВА ПРОЕКТА ======
    // ================================================================

    // ===== ЛЕНТА (deepchat-feed) =====
    const feedConfig = {
        apiKey: "AIzaSyBqUQ__eNLxAYLK2KJFfYqXlvtL-fLqBt8",
        authDomain: "deepchat-feed.firebaseapp.com",
        databaseURL: "https://deepchat-feed-default-rtdb.firebaseio.com",
        projectId: "deepchat-feed",
        storageBucket: "deepchat-feed.firebasestorage.app",
        messagingSenderId: "1046537980904",
        appId: "1:1046537980904:web:c8eaddb9bc8928d731b25d"
    };

    // ===== ОСНОВНОЙ (mychatapp-2c141) =====
    const chatConfig = {
        apiKey: "AIzaSyC81Ow4VPAUcaQGAuJjhtA-OaR8hyqxCtI",
        authDomain: "mychatapp-2c141.firebaseapp.com",
        databaseURL: "https://mychatapp-2c141-default-rtdb.firebaseio.com",
        projectId: "mychatapp-2c141",
        storageBucket: "mychatapp-2c141.firebasestorage.app",
        messagingSenderId: "857322151793",
        appId: "1:857322151793:web:387599e9e6f9cf1454a0d0"
    };

    firebase.initializeApp(feedConfig, 'feed');
    firebase.initializeApp(chatConfig, 'chat');

    const feedDB = firebase.database(firebase.app('feed'));
    const chatDB = firebase.database(firebase.app('chat'));

    const SITE_ID = window.location.hostname.replace(/\./g, '_') || 'default_site';
    let USER = localStorage.getItem('dc_user_' + SITE_ID) || '';
    let IS_ADMIN = localStorage.getItem('dc_admin_' + SITE_ID) === 'true';
    let CURRENT_ROOM = localStorage.getItem('dc_room_' + SITE_ID) || '';

    if (!USER) {
        const nick = prompt('👤 Ваше имя:');
        if (nick && nick.trim()) {
            USER = nick.trim();
            if (USER.length > 24) { alert('Слишком длинное'); return; }
            localStorage.setItem('dc_user_' + SITE_ID, USER);
        }
    }

    // ================================================================
    // ======  UI ОБНОВЛЕНИЕ ======
    // ================================================================
    function updateUI() {
        document.getElementById('topUser').textContent = '👤 ' + (USER || 'Гость');
        document.getElementById('menuUserName').textContent = USER || 'Гость';
    }
    updateUI();

    // ================================================================
    // ======  МЕНЮ ======
    // ================================================================
    function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
    }

    // ================================================================
    // ======  АДМИНКА ======
    // ================================================================
    function adminLogin() {
        const pwd = prompt('🏴‍☠️ Пароль:');
        if (pwd === '12345') {
            IS_ADMIN = true;
            localStorage.setItem('dc_admin_' + SITE_ID, 'true');
            document.getElementById('adminDot').classList.add('active');
            document.getElementById('createRoomBtn').classList.add('show');
            alert('✅ Админ-режим включён!');
            loadFeed();
            loadRooms();
        } else if (pwd !== null) {
            alert('❌ Неверный пароль!');
        }
    }
    if (IS_ADMIN) {
        document.getElementById('adminDot').classList.add('active');
        document.getElementById('createRoomBtn').classList.add('show');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // ================================================================
    // ======  ЛЕНТА ======
    // ================================================================
    function loadFeed() {
        const root = document.getElementById('feed-widget');
        if (!root) return;
        root.innerHTML = `
            <div class="feed-messages" id="feedMessages"></div>
            <div class="input-area">
                <div class="row">
                    <input type="text" id="feedInput" placeholder="Напиши пост...">
                    <button onclick="sendFeedPost()">→</button>
                </div>
                <div class="file-row">
                    <label for="feedFile">📎 фото</label>
                    <input type="file" id="feedFile" accept="image/*" style="display:none;">
                    <div class="preview" id="feedPreview">
                        <img id="feedPreviewImg">
                        <span class="pname" id="feedPreviewName"></span>
                        <button class="premove" onclick="removeFeedImage()">✕</button>
                    </div>
                </div>
            </div>
        `;

        const FEED_ROOM = 'feed_room';
        const msgRef = feedDB.ref('sites/' + SITE_ID + '/rooms/' + FEED_ROOM + '/messages');

        feedDB.ref('sites/' + SITE_ID + '/rooms/' + FEED_ROOM).once('value', snap => {
            if (!snap.exists()) {
                feedDB.ref('sites/' + SITE_ID + '/rooms/' + FEED_ROOM).set({
                    name: '📢 Лента объявлений',
                    marquee: '🏳️‍🌈 Добро пожаловать в ленту!',
                    postText: 'Здесь публикуются объявления и посты.',
                    link: null,
                    buttons: [],
                    hashtags: ['#LGBTQ', '#Community'],
                    createdAt: Date.now(),
                    createdBy: 'Admin',
                    count: 0,
                    approved: true
                });
            }
        });

        window.sendFeedPost = function() {
            const input = document.getElementById('feedInput');
            if (!input) return;
            const text = input.value.trim();
            const preview = document.getElementById('feedPreview');
            const previewImg = document.getElementById('feedPreviewImg');
            const pendingImage = preview && preview.classList.contains('show') ? previewImg.src : null;
            if (!text && !pendingImage) return;

            const data = {
                nick: USER || 'Гость',
                text: text || '📷',
                time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
                timestamp: Date.now(),
                likes: 0,
                img: pendingImage || null,
                link: null,
                marquee: null,
                buttons: [],
                hashtags: [],
                edited: false
            };

            const linkMatch = (text || '').match(/(https?:\/\/[^\s]+)/);
            if (linkMatch) data.link = linkMatch[1];

            msgRef.push(data);
            input.value = '';
            removeFeedImage();
        };

        window.removeFeedImage = function() {
            document.getElementById('feedPreview').classList.remove('show');
            document.getElementById('feedFile').value = '';
        };

        document.getElementById('feedFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                if (file.size > 2 * 1024 * 1024) { alert('Максимум 2MB'); return; }
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('feedPreviewImg').src = ev.target.result;
                    document.getElementById('feedPreviewName').textContent = file.name.slice(0, 14);
                    document.getElementById('feedPreview').classList.add('show');
                };
                reader.readAsDataURL(file);
            }
        });

        msgRef.orderByChild('timestamp').on('value', snap => {
            const messagesDiv = document.getElementById('feedMessages');
            if (!messagesDiv) return;
            messagesDiv.innerHTML = '';
            snap.forEach(s => {
                const m = s.val();
                m.id = s.key;
                renderFeedPost(m);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });

        function renderFeedPost(m) {
            const messagesDiv = document.getElementById('feedMessages');
            if (!messagesDiv) return;
            const div = document.createElement('div');
            div.className = 'post';

            let marqueeHtml = '';
            if (m.marquee) {
                marqueeHtml = `<div class="marquee-line"><span>${escapeHtml(m.marquee)}</span></div>`;
            }

            let textHtml = escapeHtml(m.text || '');
            const linkMatch = (m.text || '').match(/(https?:\/\/[^\s]+)/);
            if (linkMatch && m.link) {
                textHtml = textHtml.replace(linkMatch[1], `<span style="color:#555;font-size:0.75rem;">${linkMatch[1]}</span>`);
            }

            let imgHtml = '';
            if (m.img) {
                imgHtml = `<img class="img" src="${m.img}" onclick="window.open(this.src)">`;
            }

            let buttonsHtml = '';
            if (m.buttons && m.buttons.length > 0) {
                buttonsHtml = '<div class="btns">';
                m.buttons.forEach(btn => {
                    if (btn.url) {
                        buttonsHtml += `<a href="${escapeHtml(btn.url)}" target="_blank" class="item">${escapeHtml(btn.label || '🔗 Перейти')}</a>`;
                    }
                });
                buttonsHtml += '</div>';
            }

            let frameHtml = '';
            if (m.link) {
                frameHtml = `<div class="frame"><iframe src="${m.link}" sandbox="allow-scripts allow-same-origin allow-popups"></iframe></div>`;
            }

            let hashtagsHtml = '';
            if (m.hashtags && m.hashtags.length > 0) {
                hashtagsHtml = '<div class="hashtags">';
                m.hashtags.forEach(tag => {
                    hashtagsHtml += `<span class="tag">${escapeHtml(tag)}</span>`;
                });
                hashtagsHtml += '</div>';
            }

            let actionsHtml = `
                <button onclick="likeFeedPost('${m.id}')">👍 ${m.likes || 0}</button>
            `;
            if (m.nick === USER) {
                actionsHtml += `<button class="edit" onclick="editFeedPost('${m.id}')">✏️ ред.</button>`;
            }
            if (m.nick === USER || IS_ADMIN) {
                actionsHtml += `<button class="del" onclick="deleteFeedPost('${m.id}')">🗑</button>`;
            }

            div.innerHTML = `
                ${marqueeHtml}
                <div>
                    <span class="author">${escapeHtml(m.nick)}</span>
                    <span class="time">${m.time || ''}</span>
                    ${m.edited ? ' <span style="color:#666;font-size:0.5rem;">(ред.)</span>' : ''}
                </div>
                <div class="text">${textHtml}</div>
                ${imgHtml}
                ${buttonsHtml}
                ${frameHtml}
                ${hashtagsHtml}
                <div class="actions">${actionsHtml}</div>
            `;

            messagesDiv.appendChild(div);
        }

        window.likeFeedPost = function(id) {
            const key = `liked_${id}_${USER}`;
            if (localStorage.getItem(key)) return;
            msgRef.child(id + '/likes').transaction(v => (v || 0) + 1);
            localStorage.setItem(key, 'true');
        };

        window.deleteFeedPost = function(id) {
            if (!confirm('Удалить пост?')) return;
            msgRef.child(id).remove();
        };

        window.editFeedPost = function(id) {
            const newText = prompt('Редактировать текст:');
            if (newText !== null) {
                msgRef.child(id).update({ text: newText, edited: true, editedAt: Date.now() });
            }
        };

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'feedInput') {
                sendFeedPost();
            }
        });
    }

    // ================================================================
    // ======  КОМНАТЫ (МЕНЮ) ======
    // ================================================================
    function loadRooms() {
        chatDB.ref('sites/' + SITE_ID + '/rooms').orderByChild('createdAt').on('value', snap => {
            const data = snap.val() || {};
            const keys = Object.keys(data).sort((a, b) => (data[a].createdAt || 0) - (data[b].createdAt || 0));
            const list = document.getElementById('roomList');
            if (keys.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:#444;padding:16px;font-size:0.8rem;">Нет комнат</div>';
                return;
            }
            let html = '';
            keys.forEach(key => {
                const room = data[key];
                const active = key === CURRENT_ROOM ? 'active' : '';
                html += `<div class="room-item ${active}" onclick="selectRoom('${key}')">
                    <span>#</span>
                    <span class="rname">${room.name || 'Без названия'}</span>
                    <span class="rcount">${room.count || 0}</span>
                </div>`;
            });
            list.innerHTML = html;
        });
    }

    window.selectRoom = function(roomId) {
        CURRENT_ROOM = roomId;
        localStorage.setItem('dc_room_' + SITE_ID, roomId);
        alert('🚪 Вы перешли в комнату: ' + roomId);
        toggleMenu();
        // Здесь можно добавить открытие чата
    };

    // ================================================================
    // ======  СОЗДАНИЕ КОМНАТЫ ======
    // ================================================================
    function openCreateRoom() {
        if (!IS_ADMIN) { alert('⛔ Только для админа!'); return; }
        document.getElementById('roomModal').classList.add('open');
        document.getElementById('roomNameInput').value = '';
        document.getElementById('roomNameInput').focus();
    }

    function closeRoomModal() {
        document.getElementById('roomModal').classList.remove('open');
    }

    function createRoom() {
        const name = document.getElementById('roomNameInput').value.trim();
        if (!name) { alert('⚠️ Введите название'); return; }
        if (name.length < 2) { alert('⚠️ Минимум 2 символа'); return; }
        chatDB.ref('sites/' + SITE_ID + '/rooms').push({
            name: name,
            createdAt: Date.now(),
            count: 0
        }).then(() => {
            closeRoomModal();
            alert('✅ Комната "' + name + '" создана!');
            loadRooms();
        }).catch(e => alert('❌ ' + e.message));
    }

    // ================================================================
    // ======  ЗАПУСК ======
    // ================================================================
    loadFeed();
    loadRooms();
    console.log('📢 Лента (deepchat-feed) загружена!');
    console.log('💬 Комнаты (mychatapp-2c141) загружены!');
    console.log('👤 Пользователь:', USER || 'не задан');
    console.log('🏴‍☠️ Админ-пароль: 12345 (точка в правом нижнем углу)');
    </script>
</body>
